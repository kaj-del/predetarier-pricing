function CostConfig(){
  const {state,dispatch}=useApp();
  const cfg=state.config;
  const setPath=(path,val)=>{
    const parts=path.split('.');
    const build=(obj,keys,v)=>{ if(!keys.length) return v; const [h,...t]=keys; return {...(obj||{}),[h]:build((obj||{})[h],t,v)}; };
    dispatch({type:'UPD_CFG',data:build({},parts,val)});
  };

  const exportJson=()=>{
    const data=JSON.stringify({version:1,exportedAt:new Date().toISOString(),products:state.products,config:state.config},null,2);
    const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([data],{type:'application/json'}));
    a.download=`predetarier-${new Date().toISOString().split('T')[0]}.json`; a.click();
  };
  const importJson=()=>{
    const inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
    inp.onchange=async e=>{const t=await e.target.files[0].text(); const d=JSON.parse(t); dispatch({type:'IMPORT',products:d.products,config:d.config}); alert('Geïmporteerd!');};
    inp.click();
  };
  // ── Kolom-definitie ─────────────────────────────────────────────────────
  const XCOLS = [
    'product_id','product_naam','diersoort','product_type',
    'variant_id','variant_naam',
    'leverancier_naam','inkoop_prijs','inkoop_eenheid','gewicht_kg','btw_pct',
    'actieve_kanalen','prijslijst_kanalen',
    'verpakking_cons','kosten_uit_cons','prijs_cons_incl_btw',
    'verpakking_retail','kosten_uit_retail','prijs_retail_excl_btw',
    'verpakking_horeca','kosten_uit_horeca','prijs_horeca_excl_btw'
  ];

  // ── Export (huidige data → Excel) ────────────────────────────────────────
  const excelExport=()=>{
    if(!window.XLSX){alert('XLSX niet geladen');return;}
    const rows=[XCOLS];
    for(const p of state.products){
      for(const s of p.subproducts){
        const sup=(s.suppliers||[]).find(x=>x.active)||(s.suppliers||[])[0]||{};
        const dc=seg=>((s.segments[seg]?.disabledCosts)||[]).join(',');
        rows.push([
          p.id, p.name,
          (p.animalTypes||[]).join(','),
          (p.productTypes||[]).join(','),
          s.id, s.name,
          sup.name||'', sup.pricePerUnit??s.purchasePricePerUnit, sup.unit||s.purchaseUnit||'kg',
          s.weight, s.vatPercent,
          (s.activeSegments||SEGS).join(','),
          (s.priceListSegments||[]).join(','),
          s.segments.consumenten?.packagingType||'kopkaart', dc('consumenten'),
          s.segments.consumenten?.chosenPriceInclBtw||'',
          s.segments.retail?.packagingType||'wikkel', dc('retail'),
          s.segments.retail?.chosenPriceInclBtw||'',    // excl. BTW
          s.segments.horeca?.packagingType||'sticker', dc('horeca'),
          s.segments.horeca?.chosenPriceInclBtw||''     // excl. BTW
        ]);
      }
    }
    const ws=XLSX.utils.aoa_to_sheet(rows);
    // Breedte hints
    ws['!cols']=XCOLS.map((_,i)=>({wch:i<4?20:i<6?18:14}));
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Producten');
    XLSX.writeFile(wb,`predetarier-producten-${new Date().toISOString().split('T')[0]}.xlsx`);
  };

  // ── Import (Excel → merge met bestaande data) ────────────────────────────
  const excelImport=()=>{
    if(!window.XLSX){alert('XLSX niet geladen');return;}
    const inp=document.createElement('input'); inp.type='file'; inp.accept='.xlsx,.xls,.csv';
    inp.onchange=async e=>{
      const buf=await e.target.files[0].arrayBuffer();
      const wb=XLSX.read(buf); const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:''});

      // Deep-clone huidige producten
      const result=JSON.parse(JSON.stringify(state.products));
      let created=0, updated=0;

      for(const r of rows){
        if(!r.product_naam) continue;
        const split=v=>String(v||'').split(',').map(x=>x.trim()).filter(Boolean);
        const num=v=>v===''||v==null?null:parseFloat(v)||0;

        // Zoek product op id of naam
        let prod=result.find(p=>p.id===r.product_id||p.name===r.product_naam);
        if(!prod){
          prod={id:r.product_id||crypto.randomUUID(),name:r.product_naam,animalTypes:[],productTypes:[],subproducts:[],priceListSegments:[]};
          result.push(prod); created++;
        } else { updated++; }

        // Productveldenupdate
        if(r.product_naam) prod.name=r.product_naam;
        if(r.diersoort) prod.animalTypes=split(r.diersoort);
        if(r.product_type) prod.productTypes=split(r.product_type);

        if(!r.variant_naam) continue;

        // Zoek variant op id of naam
        let sub=prod.subproducts.find(s=>s.id===r.variant_id||s.name===r.variant_naam);
        const isNew=!sub;
        if(!sub){
          sub={...mkSub(),id:r.variant_id||crypto.randomUUID()};
          prod.subproducts.push(sub);
        }

        // Variantveldenupdate
        sub.name=r.variant_naam||sub.name;
        if(r.gewicht_kg!=='') sub.weight=+r.gewicht_kg||sub.weight;
        if(r.btw_pct!=='') sub.vatPercent=+r.btw_pct||sub.vatPercent;
        if(r.actieve_kanalen) sub.activeSegments=split(r.actieve_kanalen);
        if(r.prijslijst_kanalen!==undefined) sub.priceListSegments=split(r.prijslijst_kanalen);

        // Leverancier
        if(r.leverancier_naam||r.inkoop_prijs!==''){
          const supIdx=(sub.suppliers||[]).findIndex(s=>s.active);
          const sup={id:(sub.suppliers||[])[supIdx]?.id||crypto.randomUUID(),
            name:r.leverancier_naam||'',pricePerUnit:num(r.inkoop_prijs)??0,
            unit:r.inkoop_eenheid||'kg',active:true};
          if(supIdx>=0) sub.suppliers[supIdx]=sup; else sub.suppliers=[sup];
          sub.purchasePricePerUnit=sup.pricePerUnit; sub.purchaseUnit=sup.unit;
        }

        // Segmenten
        const segMap={
          consumenten:['verpakking_cons','kosten_uit_cons','prijs_cons_incl_btw'],
          retail:     ['verpakking_retail','kosten_uit_retail','prijs_retail_excl_btw'],
          horeca:     ['verpakking_horeca','kosten_uit_horeca','prijs_horeca_excl_btw'],
        };
        for(const [seg,[pkgCol,dcCol,priceCol]] of Object.entries(segMap)){
          if(!sub.segments[seg]) sub.segments[seg]={packagingType:'kopkaart',chosenPriceInclBtw:null,disabledCosts:[]};
          if(r[pkgCol]) sub.segments[seg].packagingType=r[pkgCol];
          if(r[dcCol]!==undefined) sub.segments[seg].disabledCosts=split(r[dcCol]);
          if(r[priceCol]!=='') sub.segments[seg].chosenPriceInclBtw=num(r[priceCol]);
          if(!sub.segments.consumenten.competitorPrices) sub.segments.consumenten.competitorPrices=[];
        }
      }

      dispatch({type:'IMPORT',products:result});
      alert(`Klaar. ${created} nieuwe producten aangemaakt, ${updated} bestaande bijgewerkt.`);
    };
    inp.click();
  };

  const F = ConfigField;

  return <div className="space-y-5">
    <div><h1 className="text-2xl font-bold text-gray-900">Kostenconfiguratie</h1>
      <p className="text-sm text-gray-400 mt-0.5">Wijzigingen worden direct opgeslagen.</p></div>

    <Card title="Verpakkingskosten">
      <div className="grid grid-cols-2 sm:grid-cols-3 gap-4">
        {Object.entries(PKG_LABELS).map(([k,l])=><F key={k} label={l} val={cfg.costs.packaging[k]??0} onChange={v=>setPath(`costs.packaging.${k}`,v)} pre="€"/>)}
      </div>
    </Card>

    <Card title="Algemene kosten & handlingstijden">
      <div className="grid grid-cols-2 sm:grid-cols-3 gap-4">
        <F label="Uurtarief handling" val={cfg.costs.handlingHourlyRate} onChange={v=>setPath('costs.handlingHourlyRate',v)} pre="€" suf="/uur"/>
        <F label="Transactiekosten" val={cfg.costs.transactionCostPercent} onChange={v=>setPath('costs.transactionCostPercent',v)} suf="%" step="0.1"/>
        <F label="Opslagkosten" val={cfg.costs.storageCostPerUnit} onChange={v=>setPath('costs.storageCostPerUnit',v)} pre="€" suf="/eenheid"/>
      </div>
      <div>
        <h3 className="text-sm font-medium text-gray-700 mb-3">Handlingstijden per segment (minuten)</h3>
        <div className="overflow-hidden rounded-lg border border-gray-200">
          <table className="w-full text-sm">
            <thead className="bg-gray-50">
              <tr>
                <th className="text-left px-4 py-2 text-xs font-semibold text-gray-500 uppercase">Segment</th>
                <th className="text-left px-4 py-2 text-xs font-semibold text-gray-500 uppercase">Labeling → GM2</th>
                <th className="text-left px-4 py-2 text-xs font-semibold text-gray-500 uppercase">Verzending → GM3</th>
              </tr>
            </thead>
            <tbody>
              {SEGS.map(seg => {
                const hm = cfg.costs.handlingMinutes?.[seg] ?? {};
                const lab = typeof hm === 'object' ? (hm.labeling??0) : hm;
                const verz = typeof hm === 'object' ? (hm.verzending??0) : 0;
                return <tr key={seg} className="border-t border-gray-100">
                  <td className="px-4 py-2 font-medium text-gray-700">{SEG_LABELS[seg]}</td>
                  <td className="px-4 py-2">
                    <div className="flex items-center gap-1.5">
                      <input type="number" step="0.5" min="0" value={lab}
                        onChange={e=>setPath(`costs.handlingMinutes.${seg}.labeling`, parseFloat(e.target.value)||0)}
                        className="inp w-20"/>
                      <span className="text-gray-400 text-xs">min.</span>
                    </div>
                  </td>
                  <td className="px-4 py-2">
                    <div className="flex items-center gap-1.5">
                      <input type="number" step="0.5" min="0" value={verz}
                        onChange={e=>setPath(`costs.handlingMinutes.${seg}.verzending`, parseFloat(e.target.value)||0)}
                        className="inp w-20"/>
                      <span className="text-gray-400 text-xs">min.</span>
                    </div>
                  </td>
                </tr>;
              })}
            </tbody>
          </table>
        </div>
        <p className="text-xs text-gray-400 mt-1.5">Beide typen gebruiken hetzelfde uurtarief (€ {fmt(cfg.costs.handlingHourlyRate,0)}/uur).</p>
      </div>
    </Card>

    <Card title="Instellingen per segment">
      {SEGS.map(sk=>{
        const s=cfg.segments[sk];
        return <div key={sk} className="bg-gray-50 rounded-lg p-4">
          <h3 className="font-medium text-sm text-gray-800 mb-3">{SEG_LABELS[sk]}</h3>
          <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
            <F label="Gem. orderwaarde" val={s.avgOrderValue} onChange={v=>setPath(`segments.${sk}.avgOrderValue`,v)} pre="€"/>
            <F label="Gratis verzending vanaf" val={s.freeShippingFrom} onChange={v=>setPath(`segments.${sk}.freeShippingFrom`,v)} pre="€"/>
            <F label="Verzendkosten" val={s.shippingCost} onChange={v=>setPath(`segments.${sk}.shippingCost`,v)} pre="€"/>
            <F label="Bezorgfee" val={s.deliveryFee??0} onChange={v=>setPath(`segments.${sk}.deliveryFee`,v)} pre="€"/>

            {sk==='consumenten'&&<F label="Min. marge (GM3)" val={(s.targetMarginMin*100).toFixed(1)} onChange={v=>setPath(`segments.${sk}.targetMarginMin`,v/100)} suf="%"/>}
            {sk==='retail'&&<><F label="Retailer marge" val={(s.retailerMargin*100).toFixed(1)} onChange={v=>setPath(`segments.${sk}.retailerMargin`,v/100)} suf="%"/>
              <F label="Min. eigen marge" val={(s.minOwnMargin*100).toFixed(1)} onChange={v=>setPath(`segments.${sk}.minOwnMargin`,v/100)} suf="%"/></>}
            {sk==='horeca'&&<F label="Doelmarge (GM3)" val={(s.targetMargin*100).toFixed(1)} onChange={v=>setPath(`segments.${sk}.targetMargin`,v/100)} suf="%"/>}
          </div>
          {/* Gratis-verzending indicator */}
          {(()=>{
            const gratis=s.freeShippingFrom>0&&s.avgOrderValue>=s.freeShippingFrom;
            return <div className={`mt-3 flex items-center gap-2 px-3 py-2 rounded-lg text-xs ${gratis?'bg-green-50 text-green-700':'bg-orange-50 text-orange-700'}`}>
              <span>{gratis?'✓':'⚠'}</span>
              <span>
                Gem. orderwaarde <strong>{eur(s.avgOrderValue,0)}</strong> is{' '}
                {gratis?'boven':'onder'} gratis-verzenddrempel <strong>{eur(s.freeShippingFrom,0)}</strong>
                {' '}→ verzendkosten worden <strong>{gratis?'niet':'wél'}</strong> toegerekend
              </span>
            </div>;
          })()}
        </div>;
      })}
    </Card>

    <Card title="Back-up & Import/Export">
      <div className="space-y-4">
        <div>
          <p className="text-sm font-medium text-gray-700 mb-3">Handmatige back-up (JSON)</p>
          <div className="flex gap-3">
            <button type="button" onClick={exportJson} className="px-3 py-2 border border-gray-300 rounded-lg text-sm hover:bg-gray-50">⬇ Exporteer JSON</button>
            <button type="button" onClick={importJson} className="px-3 py-2 border border-gray-300 rounded-lg text-sm hover:bg-gray-50">⬆ Importeer JSON</button>
          </div>
        </div>
        <div>
          <p className="text-sm font-medium text-gray-700 mb-1">Bulk bewerken (Excel)</p>
          <p className="text-xs text-gray-400 mb-3">Exporteer alle producten, pas aan in Excel, en importeer terug. Bestaande producten worden overschreven op basis van naam.</p>
          <div className="flex gap-3 flex-wrap">
            <button type="button" onClick={excelExport} className="px-3 py-2 bg-green-700 text-white rounded-lg text-sm hover:bg-green-800 flex items-center gap-2">⬇ Exporteer alle producten</button>
            <button type="button" onClick={excelImport} className="px-3 py-2 border border-gray-300 rounded-lg text-sm hover:bg-gray-50 flex items-center gap-2">⬆ Importeer & overschrijf</button>
          </div>
        </div>
        <GoogleDriveSection/>
      </div>
    </Card>
  </div>;
}

function GoogleDriveSection(){
  const {state,dispatch}=useApp();
  const [status,setStatus]=useState('');
  const [connected,setConnected]=useState(false);
  const tokenRef=useRef(null);
  const clientRef=useRef(null);
  const connect=async()=>{
    const cid=state.config.googleDrive?.clientId;
    if(!cid){setStatus('Voer eerst een Client ID in.');return;}
    const init=cid=>{
      clientRef.current=window.google?.accounts.oauth2.initTokenClient({client_id:cid,scope:'https://www.googleapis.com/auth/drive.file',callback:r=>{if(r.access_token){tokenRef.current=r.access_token;setConnected(true);setStatus('Verbonden ✓');}}});
      clientRef.current?.requestAccessToken({prompt:''});
    };
    if(!window.google){const s=document.createElement('script');s.src='https://accounts.google.com/gsi/client';s.onload=()=>init(cid);s.onerror=()=>setStatus('GSI laden mislukt');document.head.appendChild(s);}
    else init(cid);
  };
  const backup=async()=>{
    if(!tokenRef.current){setStatus('Niet verbonden.');return;}
    setStatus('Uploaden…');
    try{
      const json=JSON.stringify({version:1,exportedAt:new Date().toISOString(),products:state.products,config:state.config},null,2);
      const fn='predetarier-pricing-backup.json';
      const sr=await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${fn}'`,{headers:{Authorization:`Bearer ${tokenRef.current}`}});
      const sd=await sr.json(); const ex=sd.files?.[0];
      const fm=new FormData();
      fm.append('metadata',new Blob([JSON.stringify({name:fn,mimeType:'application/json'})],{type:'application/json'}));
      fm.append('file',new Blob([json],{type:'application/json'}));
      const url=ex?`https://www.googleapis.com/upload/drive/v3/files/${ex.id}?uploadType=multipart`:'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
      const r=await fetch(url,{method:ex?'PATCH':'POST',headers:{Authorization:`Bearer ${tokenRef.current}`},body:fm});
      if(!r.ok) throw new Error(r.status);
      const now=new Date().toISOString();
      dispatch({type:'UPD_CFG',data:{googleDrive:{lastBackup:now}}});
      setStatus(`Back-up geslaagd: ${new Date(now).toLocaleString('nl-NL')}`);
    }catch(e){setStatus(`Fout: ${e.message}`);}
  };
  return <div className="bg-blue-50 border border-blue-200 rounded-lg p-4">
    <p className="text-sm font-medium text-gray-800 mb-3">☁ Google Drive back-up</p>
    <div className="mb-3">
      <label className="block text-xs font-medium text-gray-600 mb-1">OAuth2 Client ID
        <a href="https://console.cloud.google.com/apis/credentials" target="_blank" rel="noopener" className="ml-2 text-blue-600 hover:underline font-normal">→ Google Cloud Console</a>
      </label>
      <input type="text" value={state.config.googleDrive?.clientId??''}
        onChange={e=>dispatch({type:'UPD_CFG',data:{googleDrive:{clientId:e.target.value}}})}
        className="inp w-full max-w-lg" placeholder="xxxx.apps.googleusercontent.com"/>
    </div>
    <div className="flex flex-wrap gap-3 items-center">

// ── ANALYTICS ──────────────────────────────────────────────────────────────
function Analytics(){
  const {state}=useApp();
  const chartRef=useRef(null); const chartInst=useRef(null);

  const data=useMemo(()=>{
    const rows=[];
    for(const p of state.products) for(const s of p.subproducts){
      const row={prodName:p.name,subName:s.name,short:s.name.length>12?s.name.slice(0,12)+'…':s.name,inkoop:activePurchaseCost(s)};
      const vatMult=1+s.vatPercent/100;
      for(const seg of SEGS){
        const stored=s.segments[seg]?.chosenPriceInclBtw;
        const isB2B=seg!=='consumenten';
        // stored = incl. BTW for cons, excl. BTW for B2B
        let priceExcl=null, priceForCalc=null;
        if(seg==='consumenten'){
          priceForCalc=stored; priceExcl=stored?stored/vatMult:null;
        } else {
          priceExcl=stored;
          if(!priceExcl&&seg==='horeca') priceExcl=calcMinPrice(s,'horeca',state.config,state.config.segments.horeca.targetMargin).priceExcl;
          if(!priceExcl&&seg==='retail'){const cp=s.segments.consumenten.chosenPriceInclBtw; if(cp){const rd=calcRetailData(s,state.config,cp); priceExcl=rd?.retailPriceExcl;}}
          priceForCalc=priceExcl?priceExcl*vatMult:null;
        }
        if(priceForCalc){const bd=calcBreakdown(s,seg,state.config,priceForCalc); row[`${seg}_gm3`]=bd?.gm3Pct??null; row[`${seg}_pricePerKg`]=priceExcl?priceExcl/s.weight:null;}
      }
      rows.push(row);
    }
    return rows;
  },[state.products,state.config]);

  useEffect(()=>{
    if(!chartRef.current||!data.length) return;
    if(chartInst.current) chartInst.current.destroy();
    const cd=data.filter(r=>r.consumenten_gm3!=null).slice(0,15);
    if(!cd.length) return;
    chartInst.current=new Chart(chartRef.current,{type:'bar',
      data:{labels:cd.map(r=>r.short),datasets:[{label:'GM3 Consumenten',data:cd.map(r=>r.consumenten_gm3*100),
        backgroundColor:cd.map(r=>r.consumenten_gm3<0?'#ef4444':r.consumenten_gm3<0.30?'#eab308':'#22c55e'),borderRadius:4}]},
      options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`GM3: ${c.raw.toFixed(1)}%`}}},
        scales:{y:{ticks:{callback:v=>`${v}%`},grid:{color:'#f0f0f0'}},x:{grid:{display:false}}}}});
  },[data]);

  const withC=data.filter(r=>r.consumenten_gm3!=null);
  const avgGm3=withC.length?withC.reduce((a,r)=>a+r.consumenten_gm3,0)/withC.length:null;
  const below=withC.filter(r=>r.consumenten_gm3<0.30).length;
  const above=withC.filter(r=>r.consumenten_gm3>0.70).length;
  const warnings=withC.filter(r=>r.consumenten_gm3<0.30||r.consumenten_gm3>0.70);

  return <div className="space-y-5">
    <div><h1 className="text-2xl font-bold text-gray-900">Analytics</h1>
      <p className="text-sm text-gray-400 mt-0.5">Marginoverzicht over alle producten.</p></div>

    <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
      {[['📦','Varianten totaal',data.length,`${withC.length} met consumentenprijs`,''],
        ['📈','Gem. GM3 (consumenten)',avgGm3!=null?pct(avgGm3):'—','',avgGm3!=null?(avgGm3<0.30?'text-red-600':'text-green-700'):''],
        ['⚠️','Onder minimum (< 30%)',below,'consumentenprijzen',below>0?'text-red-600':'text-green-700'],
        ['💰','Boven maximum (> 70%)',above,'mogelijk te duur','']
      ].map(([icon,label,val,sub,col])=>(
        <div key={label} className="bg-white rounded-xl border border-gray-200 p-4 flex items-start gap-3">
          <div className="text-2xl">{icon}</div>
          <div><div className="text-xs text-gray-500">{label}</div>
            <div className={`text-xl font-bold ${col}`}>{val}</div>
            {sub&&<div className="text-xs text-gray-400">{sub}</div>}
          </div>
        </div>
      ))}
    </div>

    {data.some(r=>r.consumenten_gm3!=null)&&<div className="bg-white rounded-xl border border-gray-200 p-5">
      <h2 className="font-semibold text-gray-800 mb-4">GM3 per variant (consumenten)</h2>
      <canvas ref={chartRef} height="100"/>
    </div>}

    <div className="bg-white rounded-xl border border-gray-200 overflow-hidden">
      <div className="px-5 py-3 border-b border-gray-100"><h2 className="font-semibold text-gray-800">Margeoverzicht per segment</h2></div>
      <table className="w-full text-sm">
        <thead className="bg-gray-50"><tr>
          {['Product','Variant','Inkoop','GM3 Cons.','GM3 Retail','GM3 Horeca','€/kg C incl.'].map(h=>(
            <th key={h} className="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">{h}</th>
          ))}
        </tr></thead>
        <tbody>
          {data.length===0&&<tr><td colSpan={7} className="text-center text-gray-400 py-10">Nog geen producten.</td></tr>}
          {data.map((r,i)=><tr key={i} className="border-t border-gray-100 hover:bg-gray-50">
            <td className="px-4 py-3 font-medium">{r.prodName}</td>
            <td className="px-4 py-3 text-gray-600">{r.subName}</td>
            <td className="px-4 py-3 font-mono">{eur(r.inkoop)}</td>
            {SEGS.map(seg=><td key={seg} className="px-4 py-3">{r[`${seg}_gm3`]!=null?<MarginBadge v={r[`${seg}_gm3`]}/>:<span className="text-gray-300">—</span>}</td>)}

          </tr>)}
        </tbody>
      </table>
    </div>

    {warnings.length>0&&<div className="bg-white rounded-xl border border-gray-200 p-5">
      <h2 className="font-semibold text-gray-800 mb-3">⚠️ Waarschuwingen</h2>
      <div className="space-y-2">
        {warnings.map((w,i)=><div key={i} className={`flex items-center gap-3 px-3 py-2 rounded-lg text-sm ${w.consumenten_gm3<0.30?'bg-red-50 text-red-700':'bg-yellow-50 text-yellow-700'}`}>

        </div>)}
      </div>
    </div>}
  </div>;
}

// ── PRICE LIST PAGE ────────────────────────────────────────────────────────
function PriceList(){
  const {state}=useApp();
  const [seg,setSeg]=useState('consumenten');

  const rows=useMemo(()=>{
    const out=[];
    for(const p of state.products){
      for(const s of p.subproducts){
        if(!(s.priceListSegments||[]).includes(seg)) continue;
        const vatMult=1+s.vatPercent/100;
        const stored=s.segments[seg].chosenPriceInclBtw;
        const consumerPriceIncl=s.segments.consumenten.chosenPriceInclBtw;
        let rd=null, priceExcl=null, priceForCalc=null;
        if(seg==='consumenten'){
          priceForCalc=stored; priceExcl=stored?stored/vatMult:null;
        } else {
          priceExcl=stored;
          if(seg==='retail'){
            rd=consumerPriceIncl?calcRetailData(s,state.config,consumerPriceIncl):null;
            if(!priceExcl) priceExcl=rd?.retailPriceExcl;
          }
          if(seg==='horeca'&&!priceExcl)
            priceExcl=calcMinPrice(s,'horeca',state.config,state.config.segments.horeca.targetMargin).priceExcl;
          priceForCalc=priceExcl?priceExcl*vatMult:null;
        }
        const bd=priceForCalc?calcBreakdown(s,seg,state.config,priceForCalc):null;
        const variantLabel=`${s.name} (${Math.round(s.weight*1000)}g)`;
        // Categorisering: gebruik alle types/diersoorten; wijs toe aan elk type × diersoort
        const productTypes=(p.productTypes||[]).length?(p.productTypes):['Overig'];
        const animalTypes=(p.animalTypes||[]).length?(p.animalTypes):['Onbekend'];
        for(const pt of productTypes){
          for(const at of animalTypes){
            out.push({prod:p.name,variant:variantLabel,priceExcl,priceIncl:seg==='consumenten'?stored:null,
              bd,vatMult,weight:s.weight,rd,consumerPriceIncl,productType:pt,animalType:at});
          }
        }
      }
    }
    // Sorteer: productType → animalType → productnaam
    out.sort((a,b)=>{
      const ptCmp=a.productType.localeCompare(b.productType,'nl');
      if(ptCmp!==0) return ptCmp;
      const atCmp=a.animalType.localeCompare(b.animalType,'nl');
      if(atCmp!==0) return atCmp;
      return a.prod.localeCompare(b.prod,'nl');
    });
    return out;
  },[state.products,state.config,seg]);

  const segCount=s=>state.products.reduce((n,p)=>n+p.subproducts.filter(ss=>(ss.priceListSegments||[]).includes(s)).length,0);

  // Segment-specific table headers & cells
  const TH=({children,right})=><th className={`px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide ${right?'text-right':'text-left'}`}>{children}</th>;
  const TD=({children,right,bold})=><td className={`px-4 py-3 ${right?'text-right font-mono':''}${bold?' font-semibold':''}`}>{children||'—'}</td>;

  const colCount = seg==='consumenten'?4:seg==='horeca'?3:5;

  const renderHeaders=()=>{
    if(seg==='consumenten') return <><TH>Product</TH><TH>Variant</TH><TH right>Prijs incl. BTW</TH><TH right>Kiloprijs incl. BTW</TH></>;
    if(seg==='horeca')      return <><TH>Product</TH><TH>Variant</TH><TH right>Kiloprijs excl. BTW</TH></>;
    if(seg==='retail')      return <><TH>Product</TH><TH>Variant</TH><TH right>Stuksprijs excl. BTW</TH><TH right>Adviesprijs incl. BTW</TH><TH right>Marge retailer</TH></>;
  };

  const renderRow=(r,i)=>{
    if(seg==='consumenten') return <tr key={`r-${i}`} className="border-t border-gray-100 hover:bg-gray-50">
      <TD bold>{r.prod}</TD><TD>{r.variant}</TD>
      <TD right bold>{r.priceIncl?eur(r.priceIncl):'—'}</TD>
      <TD right>{r.bd?eur(r.bd.pkgPerKgIncl):'—'}</TD>
    </tr>;
    if(seg==='horeca') return <tr key={`r-${i}`} className="border-t border-gray-100 hover:bg-gray-50">
      <TD bold>{r.prod}</TD><TD>{r.variant}</TD>
      <TD right bold>{r.priceExcl?eur(r.priceExcl/r.weight):'—'}</TD>
    </tr>;
    if(seg==='retail'){
      const retailerMargin=r.rd?.retailerMarginActual;
      return <tr key={`r-${i}`} className="border-t border-gray-100 hover:bg-gray-50">
        <TD bold>{r.prod}</TD><TD>{r.variant}</TD>
        <TD right bold>{r.priceExcl?eur(r.priceExcl):'—'}</TD>
        <TD right>{r.consumerPriceIncl?eur(r.consumerPriceIncl):'—'}</TD>
        <TD right>{retailerMargin!=null?pct(retailerMargin):'—'}</TD>
      </tr>;
    }
  };

  // Bouw rijen inclusief groepkoppen
  const renderTableBody=()=>{
    if(!rows.length) return <tr><td colSpan={colCount} className="text-center text-gray-400 py-10">
      Geen producten op de {SEG_LABELS[seg]}-prijslijst
    </td></tr>;

    const result=[];
    let lastPt=null, lastAt=null;
    rows.forEach((r,i)=>{
      // Producttype-kop (niveau 1)
      if(r.productType!==lastPt){
        result.push(
          <tr key={`pt-${r.productType}`} className="bg-green-900">
            <td colSpan={colCount} className="px-4 py-2 text-sm font-bold text-white uppercase tracking-wide">
              {r.productType}
            </td>
          </tr>
        );
        lastPt=r.productType; lastAt=null; // reset diersoort bij nieuw type
      }
      // Diersoort-kop (niveau 2)
      if(r.animalType!==lastAt){
        result.push(
          <tr key={`at-${r.productType}-${r.animalType}`} className="bg-green-50">
            <td colSpan={colCount} className="px-4 py-1.5 text-xs font-semibold text-green-800 uppercase tracking-wider">
              {r.animalType}
            </td>
          </tr>
        );
        lastAt=r.animalType;
      }
      result.push(renderRow(r,i));
    });
    return result;
  };

  return <div className="space-y-5">
    {/* ── Printlogo (alleen zichtbaar bij afdrukken) ── */}
    <div className="hidden print:block mb-6">
      <div style={{borderBottom:'2px solid #14532d',paddingBottom:'10px',marginBottom:'12px',display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
        <div style={{fontFamily:'Georgia,serif',fontSize:'22px',fontWeight:'bold',color:'#14532d'}}>
          De Predetariër
        </div>
        <div style={{fontSize:'12px',color:'#6b7280'}}>
          {new Date().toLocaleDateString('nl-NL',{day:'numeric',month:'long',year:'numeric'})}
        </div>
      </div>
      <div style={{fontSize:'17px',fontWeight:'600',color:'#111827'}}>Prijslijst {SEG_LABELS[seg]}</div>
    </div>

    {/* ── Schermweergave header ── */}
    <div className="print:hidden flex items-start justify-between">
      <div>
        <h1 className="text-2xl font-bold text-gray-900">Prijslijsten</h1>
      </div>
      <button type="button" onClick={()=>window.print()}
        className="px-4 py-2 bg-green-700 text-white rounded-lg text-sm hover:bg-green-800">
        🖨 Afdrukken
      </button>
    </div>

    <div className="flex gap-2 print:hidden">
      {SEGS.map(s=>{
        const cnt=segCount(s);
        return <button key={s} type="button" onClick={()=>setSeg(s)}
          className={`px-4 py-2 rounded-lg text-sm font-medium border transition-colors ${seg===s?'bg-green-700 text-white border-green-700':'bg-white border-gray-300 text-gray-600 hover:bg-gray-50'}`}>
          {SEG_LABELS[s]}{cnt>0&&<span className={`ml-1.5 px-1.5 py-0.5 rounded-full text-xs ${seg===s?'bg-green-600 text-white':'bg-gray-100 text-gray-600'}`}>{cnt}</span>}
        </button>;
      })}
    </div>

    <div className="bg-white rounded-xl border border-gray-200 overflow-hidden">
      <table className="w-full text-sm">
        <thead className="bg-gray-50"><tr>{renderHeaders()}</tr></thead>
        <tbody>{renderTableBody()}</tbody>
      </table>
    </div>
  </div>;
}

async function doBackup(data){const url=data.settings?.backupUrl;if(!url)return;try{await fetch(url,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:data.settings.backupEmail||"",timestamp:new Date().toISOString(),data})})}catch(e){console.error(e)}}
function compressImage(file,maxW=800,q=0.6){return new Promise(res=>{const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement("canvas");let w=img.width,h=img.height;if(w>maxW){h=h*(maxW/w);w=maxW}c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);res(c.toDataURL("image/jpeg",q))};img.src=e.target.result};r.readAsDataURL(file)})}
function isInPeriod(dateStr,period){const d=new Date(dateStr),now=new Date();if(period==="dag")return d.toDateString()===now.toDateString();if(period==="week"){const w=new Date(now);w.setDate(w.getDate()-7);return d>=w}if(period==="maand"){const m=new Date(now);m.setMonth(m.getMonth()-1);return d>=m}if(period==="jaar"){const y=new Date(now);y.setFullYear(y.getFullYear()-1);return d>=y}return true}

/* ═══ MAIN APP ═══ */
function App({initialView,goHub}){
  const[data,setData]=useState(null);
  const[assignees]=useState([...ACCOUNTS]);
  const[view,setView]=useState(initialView||"dashboard");
  const[vArg,setVArg]=useState(null);
  const[profile,setProfile]=useState(()=>{try{const p=JSON.parse(localStorage.getItem("preda-profile")||"null");if(p&&!ACCOUNTS.some(a=>a.id===p.id)){localStorage.removeItem("preda-profile");return null}return p}catch{return null}});
  useEffect(()=>{setData(loadData())},[]);
  const save=useCallback(nd=>{saveData(nd);setData(nd);doBackup(nd)},[]);
  const nav=useCallback((v,a=null)=>{setView(v);setVArg(a);window.scrollTo(0,0)},[]);
  if(!data)return<Splash/>;
  const hasPeople=ACCOUNTS.some(a=>a.icon==="👤");
  if(!profile&&hasPeople)return<ProfileGate onPick={p=>{localStorage.setItem("preda-profile",JSON.stringify(p));setProfile(p)}} goHub={goHub}/>;
  const acct=profile?{id:profile.id,name:profile.name,icon:profile.icon||"👤"}:{id:"team",name:"Team",icon:"👤"};
  const switchProfile=()=>{localStorage.removeItem("preda-profile");setProfile(null)};
  const findName=(id)=>{const a=assignees.find(x=>x.id===id)||ACCOUNTS.find(x=>x.id===id);return a?a.name:id};

  return<div style={{minHeight:"100vh",minHeight:"100dvh",paddingBottom:80}} id="app-root">
    <div className="no-print"><TopBar acct={acct} goHub={goHub} onSwitch={switchProfile} nav={nav}/></div>
    {view==="dashboard"&&<div className="no-print"><Dash data={data} nav={nav} acct={acct} findName={findName}/></div>}
    {view==="documenten"&&<div className="no-print"><DocMenu nav={nav}/></div>}
    {view==="doc-gen"&&<DocGen data={data} save={save} nav={nav} tKey={vArg}/>}
    {view==="doc-prev"&&vArg&&<DocPrev batch={vArg} nav={nav}/>}
    {view==="doc-hist"&&<DocHist data={data} nav={nav}/>}
    {view==="infographic"&&<InfoPage nav={nav}/>}
    {view==="taken"&&<div className="no-print"><TakenList data={data} save={save} nav={nav} acct={acct} assignees={assignees} findName={findName}/></div>}
    {view==="taak-new"&&<div className="no-print"><TaakForm data={data} save={save} nav={nav} acct={acct} assignees={assignees}/></div>}
    {view==="taak-det"&&<div className="no-print"><TaakDet data={data} save={save} nav={nav} tid={vArg} acct={acct} assignees={assignees} findName={findName}/></div>}
    {view==="bestellen"&&<div className="no-print"><BestelForm data={data} save={save} nav={nav} acct={acct}/></div>}
    {view==="bestel-cat"&&<div className="no-print"><BestelCatalog data={data} save={save} nav={nav} locId={vArg}/></div>}
    {view==="controles"&&<div className="no-print"><ControlesMenu nav={nav}/></div>}
    {view==="haccp"&&<div className="no-print"><HACCPCheck data={data} save={save} nav={nav} locId={vArg} acct={acct} assignees={assignees}/></div>}
    {view==="haccp-log"&&<div className="no-print"><HACCPLog data={data} nav={nav} findName={findName}/></div>}
    {view==="settings"&&<div className="no-print"><Settings data={data} save={save} nav={nav}/></div>}
    <div className="no-print"><BotNav view={view} nav={nav} data={data} goHub={goHub}/></div>
  </div>;
}

function Splash(){return<div style={{minHeight:"100vh",background:C.forest,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,color:C.sl}}><div style={{fontSize:28,fontWeight:800,letterSpacing:3}}>DE PREDETARIËR</div><div style={{fontSize:13,opacity:.6,letterSpacing:3}}>LADEN...</div></div>}
function TopBar({acct,goHub,onSwitch,nav}){return<div style={{background:C.forest,color:C.cream,padding:"12px 16px",borderBottom:"2px solid "+C.sand,position:"sticky",top:0,zIndex:100}}><div style={{maxWidth:960,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between"}}><div onClick={goHub} style={{cursor:"pointer",display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:18}}>🏠</span><div><div style={{fontSize:9,letterSpacing:4,opacity:.5,textTransform:"uppercase"}}>De Predetariër</div><div style={{fontSize:16,fontWeight:800}}>Operatie</div></div></div><div style={{display:"flex",alignItems:"center",gap:8}}><button onClick={()=>nav("settings")} style={{background:"none",border:"none",color:C.cream,fontSize:18,padding:4}}>⚙️</button><button onClick={onSwitch} title="Wissel gebruiker" style={{padding:"4px 10px",background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.2)",borderRadius:6,color:C.sand,fontSize:11,fontWeight:600}}>{acct.icon} {acct.name.split(" ")[0]}</button></div></div></div>}
function BotNav({view,nav,data,goHub}){const op=(data?.taken||[]).filter(t=>t.status!=="done").length;const items=[{id:"__hub",icon:"🏠",label:"Menu"},{id:"documenten",icon:"🖨️",label:"Docs"},{id:"taken",icon:"✅",label:"Taken",badge:op||null},{id:"bestellen",icon:"📦",label:"Bestellen"},{id:"controles",icon:"📋",label:"Controles"}];return<div style={{position:"fixed",bottom:0,left:0,right:0,background:C.forest,borderTop:"2px solid "+C.sand,display:"flex",zIndex:100,paddingBottom:"env(safe-area-inset-bottom)"}}>{items.map(it=><button key={it.id} onClick={()=>it.id==="__hub"?goHub():nav(it.id)} style={{flex:1,padding:"8px 0 6px",background:"none",border:"none",color:(it.id!=="__hub"&&(view===it.id||view.startsWith(it.id.slice(0,5))))?C.sand:"rgba(255,255,255,.5)",display:"flex",flexDirection:"column",alignItems:"center",gap:2,position:"relative"}}><span style={{fontSize:18}}>{it.icon}</span><span style={{fontSize:8,fontWeight:600,letterSpacing:.3}}>{it.label}</span>{it.badge&&<span style={{position:"absolute",top:2,right:"calc(50% - 16px)",background:C.dg,color:C.w,fontSize:8,fontWeight:700,borderRadius:10,padding:"1px 4px",minWidth:14,textAlign:"center"}}>{it.badge}</span>}</button>)}</div>}

function Dash({data,nav,acct,findName}){const my=(data.taken||[]).filter(t=>t.assignee===acct.id&&t.status!=="done");const tiles=[{icon:"🖨️",title:"Documenten",desc:"Formulieren genereren & printen",action:()=>nav("documenten"),color:C.forest},{icon:"✅",title:"Taken",desc:my.length?my.length+" open":"Geen open taken",action:()=>nav("taken"),color:C.blue,badge:my.length||null},{icon:"📦",title:"Bestellen",desc:"Bestelformulier invullen",action:()=>nav("bestellen"),color:C.sage},{icon:"📋",title:"Controles",desc:"HACCP, voorraadtelling",action:()=>nav("controles"),color:C.cu}];return<div style={{maxWidth:960,margin:"0 auto",padding:16}}><div style={{marginBottom:16}}><div style={{fontSize:18,fontWeight:800,color:C.forest}}>Hoi {acct.name.split(" ")[0]} 👋</div><div style={{fontSize:12,color:C.tl}}>Wat wil je doen?</div></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>{tiles.map((t,i)=><button key={i} onClick={t.action} style={{padding:16,background:C.w,border:"1px solid "+C.bd,borderRadius:12,textAlign:"left",borderTop:"4px solid "+t.color,position:"relative"}}><div style={{fontSize:24,marginBottom:6}}>{t.icon}</div><div style={{fontSize:14,fontWeight:700,color:C.forest}}>{t.title}</div><div style={{fontSize:10.5,color:C.tl,marginTop:2}}>{t.desc}</div>{t.badge&&<span style={{position:"absolute",top:12,right:12,background:C.dg,color:C.w,fontSize:10,fontWeight:700,borderRadius:10,padding:"2px 7px"}}>{t.badge}</span>}</button>)}</div>{my.length>0&&<div style={{marginTop:16}}><div style={{fontSize:13,fontWeight:700,color:C.forest,marginBottom:8}}>Jouw open taken</div>{my.slice(0,3).map(t=><div key={t.id} onClick={()=>nav("taak-det",t.id)} style={{background:C.w,border:"1px solid "+C.bd,borderRadius:8,padding:"10px 14px",marginBottom:6,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:12,fontWeight:600}}>{t.title}</div><div style={{fontSize:10,color:C.tl}}>van {findName(t.createdBy)}</div></div><span style={{fontSize:9,padding:"2px 8px",borderRadius:4,background:t.priority==="hoog"?C.dg:t.priority==="middel"?C.sand:C.sage,color:C.w,fontWeight:700}}>{t.priority}</span></div>)}</div>}</div>}

/* ═══ DOCUMENTEN ═══ */
function DocMenu({nav}){const items=[{key:"grofwild",icon:"🦌",title:"GP Grofwild",color:C.forest},{key:"kleinwild",icon:"🦆",title:"GP Kleinwild",color:C.sage},{key:"controle_gw",icon:"📋",title:"Controle Grofwild",color:C.cu},{key:"controle_kw",icon:"📋",title:"Controle Kleinwild",color:C.cu},{key:"registratie",icon:"👤",title:"Registratie Jager",color:C.blue},{key:"infographic",icon:"ℹ️",title:"Infographic Jagers",color:C.forest}];return<div style={{maxWidth:960,margin:"0 auto",padding:16}}><div style={{fontSize:18,fontWeight:800,color:C.forest,marginBottom:4}}>Documenten</div><div style={{fontSize:12,color:C.tl,marginBottom:16}}>Genereer en print formulieren</div>{items.map(it=><button key={it.key} onClick={()=>it.key==="infographic"?nav("infographic"):nav("doc-gen",it.key)} style={{width:"100%",padding:"14px 16px",background:C.w,border:"1px solid "+C.bd,borderRadius:10,borderLeft:"4px solid "+it.color,marginBottom:8,textAlign:"left",display:"flex",alignItems:"center",gap:12}}><span style={{fontSize:22}}>{it.icon}</span><div style={{fontSize:14,fontWeight:700,color:C.forest}}>{it.title}</div></button>)}<button onClick={()=>nav("doc-hist")} style={{width:"100%",padding:"12px",background:"transparent",border:"1px solid "+C.bd,borderRadius:10,marginTop:4,fontSize:13,fontWeight:600,color:C.forest}}>📁 Productie-historie</button></div>}
function DocGen({data,save,nav,tKey}){const[qty,setQty]=useState(5);const[busy,setBusy]=useState(false);const t=DOC_TYPES[tKey];if(!t)return null;const year=new Date().getFullYear();const isYear=!!t.yearSeq;const stored=data.nextNumbers[tKey];const nn=isYear?((stored&&typeof stored==="object"&&stored.year===year)?stored.n:1):data.nextNumbers[t.seq||tKey];const code1=v=>isYear?fmtYear(t.code,year,v):fmt(v,t.code);const gen=()=>{setBusy(true);setTimeout(()=>{const b={id:Date.now(),template:tKey,code:t.code,createdAt:new Date().toISOString(),numbers:[]};let c=nn;for(let i=0;i<qty;i++){b.numbers.push({full:code1(c),num:c});c++}const newNext=isYear?{...data.nextNumbers,[tKey]:{year,n:c}}:{...data.nextNumbers,[t.seq||tKey]:c};const nd={...data,nextNumbers:newNext,batches:[b,...data.batches]};save(nd);setBusy(false);nav("doc-prev",b)},400)};return<div className="no-print" style={{maxWidth:500,margin:"0 auto",padding:16}}><BackBtn nav={nav} to="documenten"/><div style={{background:C.w,borderRadius:12,padding:24,border:"1px solid "+C.bd}}><div style={{fontSize:18,fontWeight:800,color:C.forest,marginBottom:20}}>{t.icon} {t.label}</div><div style={{fontSize:11,fontWeight:600,color:C.tl,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Aantal</div><div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:20}}>{[1,5,10,25,50].map(n=><button key={n} onClick={()=>setQty(n)} style={{width:44,height:44,borderRadius:8,border:"2px solid "+(qty===n?C.forest:C.bd),background:qty===n?C.forest:C.w,color:qty===n?C.cream:C.tx,fontWeight:700,fontSize:15,fontFamily:mono}}>{n}</button>)}<input type="number" min={1} max={999} value={qty} onChange={e=>setQty(Math.max(1,Math.min(999,parseInt(e.target.value)||1)))} style={{width:60,height:44,borderRadius:8,border:"2px solid "+C.bd,textAlign:"center",fontSize:15,fontWeight:700,fontFamily:mono,color:C.forest}}/></div><div style={{background:C.cream,borderRadius:8,padding:14,marginBottom:20,border:"1px solid "+C.bd}}><div style={{fontSize:13}}><strong>{qty}×</strong> {t.label}{isYear&&<span style={{color:C.tl}}> · jaar {year}</span>}</div><div style={{fontSize:12,fontFamily:mono,color:C.tl,marginTop:2}}>{code1(nn)} t/m {code1(nn+qty-1)}</div></div><button onClick={gen} disabled={busy} style={{width:"100%",padding:14,background:busy?C.sage:C.forest,color:C.cream,border:"none",borderRadius:8,fontSize:15,fontWeight:700}}>{busy?"Bezig...":"Genereer "+qty+" document"+(qty>1?"en":"")}</button></div></div>}
function DocPrev({batch,nav}){const t=DOC_TYPES[batch.template]||{};return<div><div className="no-print" style={{maxWidth:960,margin:"0 auto",padding:"16px 16px 8px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}><div style={{fontSize:15,fontWeight:700,color:C.forest}}>{t.label||batch.template} · {batch.numbers.length}×</div><div style={{display:"flex",gap:6}}><button onClick={()=>nav("documenten")} style={{padding:"8px 14px",background:C.w,color:C.forest,border:"1px solid "+C.bd,borderRadius:8,fontSize:12,fontWeight:600}}>← Terug</button><button onClick={()=>window.print()} style={{padding:"8px 16px",background:C.forest,color:C.cream,border:"none",borderRadius:8,fontSize:12,fontWeight:700}}>🖨️ Print</button></div></div><div id="printable-area" style={{maxWidth:960,margin:"0 auto",padding:"0 16px 40px"}}>{batch.numbers.map(n=>{if(batch.template==="grofwild")return<GWForm key={n.num} n={n}/>;if(batch.template==="kleinwild")return<KWForm key={n.num} n={n}/>;if(batch.template==="controle_gw")return<CGWForm key={n.num} n={n}/>;if(batch.template==="controle_kw")return<CKWForm key={n.num} n={n}/>;if(batch.template==="registratie")return<RegForm key={n.num} n={n}/>;return null})}</div></div>}
function DocHist({data,nav}){return<div className="no-print" style={{maxWidth:960,margin:"0 auto",padding:16}}><BackBtn nav={nav} to="documenten"/><div style={{fontSize:18,fontWeight:800,color:C.forest,marginBottom:12}}>Productie-historie</div>{data.batches.length===0?<div style={{background:C.w,borderRadius:12,padding:32,border:"1px solid "+C.bd,textAlign:"center",color:C.tl}}>Nog geen producties.</div>:data.batches.map(b=>{const t=DOC_TYPES[b.template]||{};return<div key={b.id} style={{background:C.w,borderRadius:8,padding:"10px 14px",border:"1px solid "+C.bd,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>nav("doc-prev",b)}><div><span style={{padding:"2px 6px",borderRadius:4,fontSize:9,fontWeight:700,background:t.color||C.forest,color:C.w,marginRight:8}}>{b.code}</span><span style={{fontWeight:600,fontSize:12,fontFamily:mono}}>{b.numbers[0]?.full}–{b.numbers[b.numbers.length-1]?.full}</span></div><div style={{fontSize:11,color:C.tl}}>{b.numbers.length}× · {new Date(b.createdAt).toLocaleDateString("nl-NL")}</div></div>})}</div>}

/* ═══ TAKEN ═══ */
function TakenList({data,save,nav,acct,assignees,findName}){const[period,setPeriod]=useState("alles");const[filterAcct,setFilterAcct]=useState("alle");const taken=data.taken||[];const filtered=taken.filter(t=>{if(filterAcct!=="alle"&&t.assignee!==filterAcct)return false;if(period!=="alles"&&!isInPeriod(t.createdAt,period))return false;return true});const sorted=[...filtered].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));return<div style={{maxWidth:960,margin:"0 auto",padding:16}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><div style={{fontSize:18,fontWeight:800,color:C.forest}}>Taken</div><button onClick={()=>nav("taak-new")} style={{padding:"8px 16px",background:C.forest,color:C.cream,border:"none",borderRadius:8,fontSize:12,fontWeight:700}}>+ Nieuw</button></div><div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>{["dag","week","maand","jaar","alles"].map(p=><button key={p} onClick={()=>setPeriod(p)} style={{padding:"4px 10px",borderRadius:6,border:"1px solid "+(period===p?C.forest:C.bd),background:period===p?C.forest:C.w,color:period===p?C.cream:C.tx,fontSize:10,fontWeight:600,textTransform:"capitalize"}}>{p}</button>)}</div><select value={filterAcct} onChange={e=>setFilterAcct(e.target.value)} style={{...inp,marginBottom:12,fontSize:12,padding:"8px 10px"}}><option value="alle">Alle accounts</option>{assignees.map(a=><option key={a.id} value={a.id}>{a.icon} {a.name}</option>)}</select>{sorted.length===0?<div style={{background:C.w,borderRadius:12,padding:32,border:"1px solid "+C.bd,textAlign:"center",color:C.tl}}>Geen taken gevonden.</div>:sorted.map(t=>{ return<div key={t.id} onClick={()=>nav("taak-det",t.id)} style={{background:C.w,border:"1px solid "+C.bd,borderRadius:10,padding:"12px 14px",marginBottom:8,cursor:"pointer",opacity:t.status==="done"?.5:1,borderLeft:"4px solid "+(t.priority==="hoog"?C.dg:t.priority==="middel"?C.sand:C.sage)}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:C.forest,textDecoration:t.status==="done"?"line-through":"none"}}>{t.title}</div><div style={{fontSize:10,color:C.tl,marginTop:2}}>→ {findName(t.assignee)} · {new Date(t.createdAt).toLocaleDateString("nl-NL")}{t.deadline&&<span style={{color:new Date(t.deadline)<new Date()&&t.status!=="done"?C.dg:C.tl}}> · ⏰{new Date(t.deadline).toLocaleDateString("nl-NL")}</span>}{t.repeat&&t.repeat!=="geen"&&<span> · 🔁</span>}</div></div><div style={{display:"flex",alignItems:"center",gap:5}}>{t.orderItems&&<span style={{fontSize:13}}>📦</span>}{t.photo&&<span style={{fontSize:13}}>📷</span>}{t.status==="done"&&<span style={{fontSize:13}}>✅</span>}</div></div></div>})}</div>}
function TaakForm({data,save,nav,acct,assignees}){const[title,setTitle]=useState("");const[desc,setDesc]=useState("");const[assignee,setAssignee]=useState(acct.id);const[prio,setPrio]=useState("normaal");const[photo,setPhoto]=useState(null);const[deadline,setDeadline]=useState("");const[repeat,setRepeat]=useState("geen");const fRef=useRef();const handleP=async e=>{const f=e.target.files[0];if(!f)return;setPhoto(await compressImage(f))};const submit=()=>{if(!title.trim())return;const t={id:Date.now().toString(),title:title.trim(),description:desc.trim(),assignee,priority:prio,status:"open",createdBy:acct.id,createdAt:new Date().toISOString(),photo:photo||null,deadline:deadline||null,repeat};const nd={...data,taken:[t,...(data.taken||[])]};save(nd);nav("taken")};return<div style={{maxWidth:500,margin:"0 auto",padding:16}}><BackBtn nav={nav} to="taken"/><div style={{background:C.w,borderRadius:12,padding:24,border:"1px solid "+C.bd}}><div style={{fontSize:18,fontWeight:800,color:C.forest,marginBottom:20}}>Nieuwe taak</div><div style={{marginBottom:14}}><label style={{fontSize:11,fontWeight:600,color:C.tl,textTransform:"uppercase",letterSpacing:1}}>Titel *</label><input value={title} onChange={e=>setTitle(e.target.value)} style={{...inp,marginTop:4}} placeholder="Wat moet er gebeuren?"/></div><div style={{marginBottom:14}}><label style={{fontSize:11,fontWeight:600,color:C.tl,textTransform:"uppercase",letterSpacing:1}}>Beschrijving</label><textarea value={desc} onChange={e=>setDesc(e.target.value)} rows={3} style={{...inp,marginTop:4,resize:"vertical"}} placeholder="Details..."/></div><div style={{marginBottom:14}}><label style={{fontSize:11,fontWeight:600,color:C.tl,textTransform:"uppercase",letterSpacing:1}}>Toewijzen aan</label><select value={assignee} onChange={e=>setAssignee(e.target.value)} style={{...inp,marginTop:4}}>{assignees.map(a=><option key={a.id} value={a.id}>{a.icon} {a.name}</option>)}</select></div><div style={{display:"flex",gap:10,marginBottom:14}}><div style={{flex:1}}><label style={{fontSize:11,fontWeight:600,color:C.tl,textTransform:"uppercase",letterSpacing:1}}>Deadline</label><input type="date" value={deadline} onChange={e=>setDeadline(e.target.value)} style={{...inp,marginTop:4}}/></div><div style={{flex:1}}><label style={{fontSize:11,fontWeight:600,color:C.tl,textTransform:"uppercase",letterSpacing:1}}>Herhaling</label><select value={repeat} onChange={e=>setRepeat(e.target.value)} style={{...inp,marginTop:4}}><option value="geen">Geen</option><option value="dagelijks">Dagelijks</option><option value="maandelijks">Maandelijks</option><option value="kwartaal">Kwartaallijks</option><option value="jaarlijks">Jaarlijks</option></select></div></div><div style={{marginBottom:14}}><label style={{fontSize:11,fontWeight:600,color:C.tl,textTransform:"uppercase",letterSpacing:1}}>Prioriteit</label><div style={{display:"flex",gap:8,marginTop:4}}>{[["normaal","Normaal",C.sage],["middel","Middel",C.sand],["hoog","Hoog",C.dg]].map(([k,l,c])=><button key={k} onClick={()=>setPrio(k)} style={{flex:1,padding:8,borderRadius:8,border:"2px solid "+(prio===k?c:C.bd),background:prio===k?c:C.w,color:prio===k?C.w:C.tx,fontSize:12,fontWeight:600}}>{l}</button>)}</div></div><div style={{marginBottom:20}}><label style={{fontSize:11,fontWeight:600,color:C.tl,textTransform:"uppercase",letterSpacing:1}}>Foto</label><input ref={fRef} type="file" accept="image/*" capture="environment" onChange={handleP} style={{display:"none"}}/><button onClick={()=>fRef.current.click()} style={{display:"block",width:"100%",marginTop:4,padding:12,background:C.cream,border:"1px dashed "+C.bd,borderRadius:8,fontSize:12,color:C.tl}}>📷 {photo?"Wijzigen":"Toevoegen"}</button>{photo&&<img src={photo} style={{width:"100%",maxHeight:200,objectFit:"cover",borderRadius:8,marginTop:8}}/>}</div><button onClick={submit} style={{width:"100%",padding:14,background:title.trim()?C.forest:C.bd,color:C.cream,border:"none",borderRadius:8,fontSize:15,fontWeight:700}}>Taak aanmaken</button></div></div>}
function TaakDet({data,save,nav,tid,acct,assignees,findName}){const[reassign,setReassign]=useState(false);const taak=(data.taken||[]).find(t=>t.id===tid);if(!taak)return<div style={{padding:24,textAlign:"center",color:C.tl}}>Taak niet gevonden.<br/><button onClick={()=>nav("taken")} style={{marginTop:12,padding:"8px 16px",background:C.forest,color:C.cream,border:"none",borderRadius:8}}>Terug</button></div>;const as=assignees.find(a=>a.id===taak.assignee)||ACCOUNTS.find(a=>a.id===taak.assignee);const cr=assignees.find(a=>a.id===taak.createdBy)||ACCOUNTS.find(a=>a.id===taak.createdBy);const toggle=()=>{save({...data,taken:data.taken.map(t=>t.id===tid?{...t,status:t.status==="done"?"open":"done",doneAt:t.status!=="done"?new Date().toISOString():null,doneBy:t.status!=="done"?acct.id:null}:t)})};const del=()=>{save({...data,taken:data.taken.filter(t=>t.id!==tid)});nav("taken")};const doReassign=(newId)=>{save({...data,taken:data.taken.map(t=>t.id===tid?{...t,assignee:newId}:t)});setReassign(false)};const orderSups=taak.orderItems?[...new Set(taak.orderItems.map(i=>i.supplier))]:[];return<div style={{maxWidth:500,margin:"0 auto",padding:16}}><BackBtn nav={nav} to="taken"/><div style={{background:C.w,borderRadius:12,padding:20,border:"1px solid "+C.bd}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}><div style={{fontSize:17,fontWeight:800,color:C.forest,flex:1}}>{taak.title}</div><span style={{padding:"3px 8px",borderRadius:4,fontSize:10,fontWeight:700,background:taak.priority==="hoog"?C.dg:taak.priority==="middel"?C.sand:C.sage,color:C.w}}>{taak.priority}</span></div>{taak.orderItems&&taak.orderItems.length>0&&<div style={{marginBottom:12}}><div style={{fontSize:11,fontWeight:700,color:C.tl,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Bestellijst — {taak.orderLocation||""}</div>{orderSups.map(sup=>{const items=taak.orderItems.filter(i=>i.supplier===sup);const cats=[...new Set(items.map(i=>i.category))];re rong></div><div style={{fontSize:11,color:C.tl,marginBottom:3}}>Aangemaakt door: <strong style={{color:C.tx}}>{cr?.name}</strong></div><div style={{fontSize:11,color:C.tl,marginBottom:3}}>Datum: {new Date(taak.createdAt).toLocaleString("nl-NL")}</div>{taak.deadline&&<div style={{fontSize:11,color:C.tl,marginBottom:3}}>Deadline: <strong style={{color:new Date(taak.deadline)<new Date()&&taak.status!=="done"?C.dg:C.tx}}>{new Date(taak.deadline).toLocaleDateString("nl-NL")}</strong>{new Date(taak.deadline)<new Date()&&taak.status!=="done"&&<span style={{color:C.dg,fontWeight:700}}> ⚠️ Verlopen</span>}</div>}{taak.repeat&&taak.repeat!=="geen"&&<div style={{fontSize:11,color:C.tl,marginBottom:3}}>Herhaling: <strong style={{color:C.tx}}>🔁 {taak.repeat}</strong></div>}<div style={{marginBottom:10}}/>{taak.orderItems&&<button onClick={()=>window.print()} style={{width:"100%",padding:10,background:C.blue,color:C.cream,border:"none",borderRadius:8,fontSize:12,fontWeight:700,marginBottom:8}}>🖨️ Bestelbon printen</button>}{taak.status==="done"&&<div style={{fontSize:11,color:C.sage,marginBottom:10,fontWeight:600}}>✅ Afgerond{taak.doneBy?" door "+(assignees.find(a=>a.id===taak.doneBy)||ACCOUNTS.find(a=>a.id===taak.doneBy))?.name:""}</div>}{!reassign?<button onClick={()=>setReassign(true)} style={{width:"100%",padding:10,background:C.cream,border:"1px solid "+C.bd,borderRadius:8,fontSize:12,fontWeight:600,color:C.forest,marginBottom:8}}>🔄 Doorverwijzen</button>:<div style={{background:C.cream,borderRadius:8,padding:10,marginBottom:8,border:"1px solid "+C.bd}}><div style={{fontSize:11,fontWeight:600,color:C.tl,marginBottom:6}}>Doorverwijzen naar:</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>{assignees.filter(a=>a.id!==taak.assignee).map(a=><button key={a.id} onClick={()=>doReassign(a.id)} style={{padding:"8px",background:C.w,border:"1px solid "+C.bd,borderRadius:6,fontSize:11,fontWeight:600,color:C.forest}}>{a.icon} {a.name}</button>)}</div><button onClick={()=>setReassign(false)} style={{width:"100%",marginTop:6,padding:6,background:"transparent",border:"none",fontSize:11,color:C.tl}}>Annuleer</button></div>}<div style={{display:"flex",gap:8}}><button onClick={toggle} style={{flex:1,padding:12,background:taak.status==="done"?C.sand:C.forest,color:C.cream,border:"none",borderRadius:8,fontSize:13,fontWeight:700}}>{taak.status==="done"?"↩ Heropenen":"✅ Afronden"}</button><button onClick={del} style={{padding:"12px 16px",background:C.w,color:C.dg,border:"1px solid "+C.dg,borderRadius:8,fontSize:13,fontWeight:700}}>🗑️</button></div></div></div>}

function BestelForm({data,save,nav,acct}){const[locId,setLocId]=useState(LOCATIONS[0].id);const loc=LOCATIONS.find(l=>l.id===locId);const catalog=getCatalog(data,locId);const[qtys,setQtys]=useState({});const[submitted,setSubmitted]=useState(false);useEffect(()=>{const q={};getCatalog(data,locId).forEach((p,i)=>{q[p.id||i]=0});setQtys(q)},[locId,data]);const setQ=(id,v)=>setQtys(prev=>({...prev,[id]:Math.max(0,parseInt(v)||0)}));const submit=()=>{const items=catalog.map((p,i)=>{const id=p.id||i.toString();const q=qtys[id]||0;return q>0?{supplier:p.supplier,category:p.category,product:p.product,eenheid:p.eenheid||"stuks",qty:q}:null}).filter(Boolean);if(items.length===0)return;const order={id:Date.now().toString(),location:locId,locationName:loc?.name||locId,createdBy:acct.id,createdAt:new Date().toISOString(),items};const taak={id:(Date.now()+1).toString(),title:"📦 Bestelling "+loc?.name,description:"",orderItems:items,orderLocation:loc?.name,assignee:locId,priority:"middel",status:"open",createdBy:acct.id,createdAt:new Date().toISOString(),photo:null,deadline:null,repeat:"geen"};const nd={...data,orders:[order,...(data.orders||[])],taken:[taak,...(data.taken||[])]};save(nd);setSubmitted(true);setTimeout(()=>{setSubmitted(false);nav("taken")},1500)};const suppliers=[...new Set(catalog.map(p=>p.supplier))];const totalItems=Object.values(qtys).filter(v=>v>0).length;return<div style={{maxWidth:600,margin:"0 auto",padding:16}}><div style={{fontSize:18,fontWeight:800,color:C.forest,marginBottom:12}}>📦 Bestelling</div><div style={{display:"flex",gap:6,marginBottom:16}}>{LOCATIONS.map(l=><button key={l.id} onClick={()=>setLocId(l.id)} style={{flex:1,padding:"10px 8px",borderRadius:8,border:"2px solid "+(locId===l.id?C.forest:C.bd),background:locId===l.id?C.forest:C.w,color:locId===l.id?C.cream:C.tx,fontSize:12,fontWeight:700,textAlign:"center"}}><div style={{fontSize:16}}>{l.icon}</div>{l.name}</button>)}</div><div style={{display:"flex",justifyContent:"flex-end",marginBott function BestelCatalog({data,save,nav,locId}){const loc=LOCATIONS.find(l=>l.id===locId);const catalog=getCatalog(data,locId);const[items,setItems]=useState(()=>catalog.map((p,i)=>({...p,id:p.id||i.toString(),eenheid:p.eenheid||"stuks"})));const[addingTo,setAddingTo]=useState(null);const[newSup,setNewSup]=useState("");const[newCat,setNewCat]=useState("");const[newProd,setNewProd]=useState("");const[newMin,setNewMin]=useState(1);const[newEenheid,setNewEenheid]=useState("stuks");const EENHEDEN=["stuks","tray","kratje","pallet","doos","fles","zak","kg"];const saveCat=()=>{save({...data,catalogs:{...data.catalogs,shared:items}});nav("bestellen")};const updateMin=(id,v)=>setItems(prev=>prev.map(p=>p.id===id?{...p,min:Math.max(1,parseInt(v)||1)}:p));const updateEenheid=(id,v)=>setItems(prev=>prev.map(p=>p.id===id?{...p,eenheid:v}:p));const removeItem=(id)=>setItems(prev=>prev.filter(p=>p.id!==id));const addItem=(supplier)=>{if(!newProd.trim())return;const sup=supplier==="__new__"?newSup.trim():supplier;if(!sup)return;setItems(prev=>[...prev,{id:Date.now().toString(),supplier:sup,category:newCat.trim(),product:newProd.trim(),min:Math.max(1,parseInt(newMin)||1),eenheid:newEenheid}]);setNewProd("");setNewCat("");setNewMin(1);setNewEenheid("stuks");setNewSup("");setAddingTo(null)};const suppliers=[...new Set(items.map(p=>p.supplier))];return<div style={{maxWidth:600,margin:"0 auto",padding:16}}><button onClick={()=>nav("bestellen")} style={{background:"none",border:"none",color:C.forest,fontSize:13,fontWeight:600,marginBottom:12}}>← Terug</button><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><div style={{fontSize:16,fontWeight:800,color:C.forest}}>Catalogus <span style={{fontWeight:500,color:C.tl,fontSize:13}}>(alle locaties)</span></div><button onClick={saveCat} style={{padding:"8px 16px",background:C.forest,color:C.cream,border:"none",borderRadius:8,fontSize:12,fontWeight:700}}>💾 Opslaan</button></div>{suppliers.map(sup=>{const supItems=items.filter(p=>p.supplier===sup);const cats=[...new Set(supItems.map(p=>p.category))];const existingCatsForSup=[...new Set(supItems.map(p=>p.category).filter(Boolean))];return<div key={sup} style={{background:C.w,borderRadius:10,border:"1px solid "+C.bd,marginBottom:10,overflow:"hidden"}}><div style={{background:C.forest,color:C.cream,padding:"6px 12px",fontSize:12,fontWeight:700}}>{sup}</div><div style={{padding:8}}>{cats.map(cat=>{const ci=supItems.filter(p=>p.category===cat);return<div key={cat||"_root"}>{cat&&<div style={{fontSize:11,fontWeight:700,color:C.forest,marginTop:6,marginBottom:4,paddingBottom:3,borderBottom:"2px solid "+C.forest}}>{cat}</div>}{ci.map(p=><div key={p.id} style={{display:"flex",alignItems:"center",gap:4,padding:"3px 0",borderBottom:"1px solid "+C.cream,flexWrap:"wrap"}}><span style={{flex:1,fontSize:11,minWidth:80}}>{p.product}</span><select value={p.eenheid||"stuks"} onChange={e=>updateEenheid(p.id,e.target.value)} style={{height:24,borderRadius:4,border:"1px solid "+C.bd,fontSize:10,padding:"0 2px",color:C.sage,fontWeight:600}}>{EENHEDEN.map(e=><option key={e} value={e}>{e}</option>)}</select><span style={{fontSize:9,color:C.tl}}>min:</span><input type="number" value={p.min} onChange={e=>updateMin(p.id,e.target.value)} style={{width:36,height:24,borderRadius:4,border:"1px solid "+C.bd,textAlign:"center",fontSize:11,fontFamily:mono}}/><button onClick={()=>removeItem(p.id)} style={{width:24,height:24,borderRadius:4,border:"none",background:C.cream,color:C.dg,fontSize:12,fontWeight:700}}>✕</button></div>)}</div>})}</div>{addingTo===sup?<div style={{background:C.cream,borderRadius:8,padding:12,margin:"6px 8px 8px"}}><div style={{fontSize:12,fontWeight:700,color:C.forest,marginBottom:8}}>Product toevoegen aan {sup}</div><div style={{marginBottom:8}}><label style={{fontSize:10,fontWeight:600,color:C.tl}}>Categorie (optioneel)</label><input list={"dlc-"+sup.replace(/\s/g,"")} value={newCat} onChange={e=>setNewCat(e.target.value) Sup("");setNewProd("");setNewCat("");setNewMin(1);setNewEenheid("stuks")}} style={{width:"100%",padding:14,background:C.w,border:"2px dashed "+C.bd,borderRadius:10,fontSize:13,fontWeight:700,color:C.forest,marginTop:4}}>+ Nieuwe leverancier</button>}</div>}

const HACCP_HYGIENE=[{id:"wc",label:"WC",items:["Schoon","Zeep aanwezig","Papier aanwezig","Prullenbak geleegd"]},{id:"slacht",label:"Slachtruimte",items:["Vloer schoon","Werkbladen schoon en ontsmet","Gereedschap schoon","Afval verwijderd"]},{id:"charcut",label:"Charcuteriecorner",items:["Werkblad schoon","Snijplanken ontsmet","Messenset schoon","Koelvitrine schoon","Producten afgedekt"]},{id:"brood",label:"Broodjes kant",items:["Werkblad schoon","Snijmachine schoon","Ingrediënten afgedekt","Handschoenen beschikbaar"]},{id:"wild",label:"Wildkant",items:["Werkblad schoon","Hakblok ontsmet","Koeling schoon","Producten gelabeld"]}];
const HACCP_TEMPS=[{id:"koeling1",label:"Koeling 1",desc:"max 7°C",auto:false},{id:"koeling2",label:"Koeling 2",desc:"max 7°C",auto:false},{id:"koeling3",label:"Koeling 3",desc:"max 7°C",auto:false},{id:"koeling4",label:"Koeling 4",desc:"max 7°C",auto:false},{id:"vitrine",label:"Koelvitrine",desc:"max 7°C",auto:false},{id:"vriezer1",label:"Vriezer 1",desc:"max -18°C",auto:true},{id:"vriezer2",label:"Vriezer 2",desc:"max -18°C",auto:true}];

function HACCPCheck({data,save,nav,locId,acct,assignees}){const loc=LOCATIONS.find(l=>l.id===locId)||{name:locId};const[checker,setChecker]=useState(acct.id);const[customName,setCustomName]=useState("");const[hygieneChecks,setHC]=useState(()=>{const o={};HACCP_HYGIENE.forEach(g=>g.items.forEach((_,i)=>{o[g.id+"_"+i]=null}));return o});const[tempChecks,setTC]=useState(()=>{const o={};HACCP_TEMPS.forEach(t=>{o[t.id]=null});return o});const[extraChecks,setEC]=useState(()=>{const o={};HACCP_EXTRA.forEach(e=>{o[e.id]=null});return o});const[customChecks,setCC]=useState([]);const[addingCustom,setAddingCustom]=useState(false);const[customLabel,setCustomLabel]=useState("");const[note,setNote]=useState("");const[submitted,setSubmitted]=useState(false);const addCustom=()=>{if(!customLabel.trim())return;setCC(prev=>[...prev,{id:"custom_"+Date.now(),label:customLabel.trim(),val:null}]);setCustomLabel("");setAddingCustom(false)};const setCustomVal=(id,v)=>setCC(prev=>prev.map(c=>c.id===id?{...c,val:v}:c));const submitCheck=()=>{const checkerName=checker==="anders"?customName.trim()||"Onbekend":assignees.find(a=>a.id===checker)?.name||ACCOUNTS.find(a=>a.id===checker)?.name||checker;const haccpResults=[];HACCP_HYGIENE.forEach(g=>{g.items.forEach((item,i)=>{const v=hygieneChecks[g.id+"_"+i];haccpResults.push({section:g.label,item:item,ok:v===true,nvt:v==="nvt",checked:v!==null})})});HACCP_TEMPS.forEach(t=>{const v=tempChecks[t.id];haccpResults.push({section:"Temperatuur",item:t.label+" ("+t.desc+")"+(t.auto?" [auto]":""),ok:v===true,nvt:v==="nvt",checked:v!==null})});HACCP_EXTRA.forEach(e=>{const v=extraChecks[e.id];haccpResults.push({section:"Algemeen",item:e.label,ok:v===true,nvt:v==="nvt",checked:v!==null})});customChecks.forEach(c=>{haccpResults.push({section:"Handmatig",item:c.label,ok:c.val===true,nvt:c.val==="nvt",checked:c.val!==null})});const issues=haccpResults.filter(r=>r.checked&&!r.ok&&!r.nvt);const logEntry={id:Date.now().toString(),location:locId,locationName:loc.name,checkedBy:checker,checkedByName:checkerName,date:new Date().toISOString(),results:haccpResults,temps:[],note,issues:issues.length,tempIssues:0,allOk:issues.length===0};let nd={...data,haccpLogs:[logEntry,...(data.haccpLogs||[])]};if(issues.length>0){const taak={id:(Date.now()+1).toString(),title:"⚠️ HACCP afwijking "+loc.name,description:"Controle door "+checkerName+" op "+new Date().toLocaleDateString("nl-NL")+":\n\n"+issues.map(i=>"❌ "+i.section+" — "+i.item).join("\n")+(note?"\n\nOpmerking: "+note:""),assignee:acct.id,priority:"hoog",status:"open",createdBy:acct.id,createdAt:new Date().toISOString(),photo:null,deadline:null,repeat:"geen"};nd={...nd,taken:[taak,...(nd.taken||[])]}}save(nd);setSubmitted(true);setTimeout(()=>nav("controles"),1500)};const CheckBtn=({val,onSet})=><div style={{display:"flex",gap:3}}><button onClick={()=>onSet(true)} style={{width:30,height:26,borderRadius:6,border:"2px solid "+(val===true?C.sage:C.bd),background:val===true?C.sage:C.w,color:val===true?C.w:C.tl,fontSize:11,fontWeight:700}}>✓</button><button onClick={()=>onSet(false)} style={{width:30,height:26,borderRadius:6,border:"2px solid "+(val===false?C.dg:C.bd),background:val===false?C.dg:C.w,color:val===false?C.w:C.tl,fontSize:11,fontWeight:700}}>✗</button><button onClick={()=>onSet("nvt")} style={{width:34,height:26,borderRadius:6,border:"2px solid "+(val==="nvt"?C.tl:C.bd),background:val==="nvt"?"#999":C.w,color:val==="nvt"?C.w:C.tl,fontSize:9,fontWeight:700}}>n.v.t.</button></div>;return<div style={{maxWidth:600,margin:"0 auto",padding:16}}><BackBtn nav={nav} to="controles"/><div style={{fontSize:18,fontWeight:800,color:C.forest,marginBottom:4}}>HACCP Controle</div><div style={{fontSize:13,color:C.tl,marginBottom:12}}>📍 {loc.name} — {new Date().toLocaleDateString("nl-NL")}</div><div style={{background:C.w,borderRadius:10,border:"1px solid "+C.bd,marginBottom:12,padding:12}}><div style={{fontSize:11,fontWeight:700,color:C.tl,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Uitgevoerd door</div><div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:checker==="anders"?8:0}}>{assignees.map(a=><button key={a.id} onClick={()=>setChecker(a.id)} style={{padding:"6px 10px",borderRadius:6,border:"2px solid "+(checker===a.id?C.forest:C.bd),background:checker===a.id?C.forest:C.w,color:checker===a.id?C.cream:C.tx,fontSize:11,fontWeight:600}}>{a.icon} {a.name.split(" ")[0]}</button>)}<button onClick={()=>setChecker("anders")} style={{padding:"6px 10px",borderRadius:6,border:"2px solid "+(checker==="anders"?C.forest:C.bd),background:checker==="anders"?C.forest:C.w,color:checker==="anders"?C.cream:C.tx,fontSize:11,fontWeight:600}}>✏️ Anders</button></div>{checker==="anders"&&<input value={customName} onChange={e=>setCustomName(e.target.value)} style={{...inp,fontSize:12,padding:"8px 10px"}} placeholder="Naam invullen..."/>}</div>{HACCP_HYGIENE.map(g=><div key={g.id} style={{background:C.w,borderRadius:10,border:"1px solid "+C.bd,marginBottom:10,overflow:"hidden"}}><div style={{background:C.forest,color:C.cream,padding:"7px 12px",fontSize:12,fontWeight:700}}>{g.label}</div><div style={{padding:8}}>{g.items.map((item,i)=><div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"5px 4px",borderBottom:i<g.items.length-1?"1px solid "+C.cream:"none"}}><span style={{fontSize:12,flex:1}}>{item}</span><CheckBtn val={hygieneChecks[g.id+"_"+i]} onSet={v=>setHC(prev=>({...prev,[g.id+"_"+i]:v}))}/></div>)}</div></div>)}<div style={{background:C.w,borderRadius:10,border:"1px solid "+C.bd,marginBottom:10,overflow:"hidden"}}><div style={{background:C.blue,color:C.cream,padding:"7px 12px",fontSize:12,fontWeight:700}}>🌡️ Temperatuurcontrole</div><div style={{padding:8}}>{HACCP_TEMPS.map(t=><div key={t.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"5px 4px",borderBottom:"1px solid "+C.cream}}><div style={{flex:1}}><span style={{fontSize:12}}>{t.label}</span><span style={{font function Settings({data,save,nav}){const[url,setUrl]=useState(data.settings?.backupUrl||"");const[email,setEmail]=useState(data.settings?.backupEmail||"");const[saved,setSaved]=useState(false);const saveSt=()=>{save({...data,settings:{backupUrl:url.trim(),backupEmail:email.trim()}});setSaved(true);setTimeout(()=>setSaved(false),2000)};const exp=()=>{const b=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="preda-backup-"+new Date().toISOString().slice(0,10)+".json";a.click();URL.revokeObjectURL(u)};const imp=()=>{const i=document.createElement("input");i.type="file";i.accept=".json";i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.nextNumbers||d.nextNumber){if(d.nextNumber&&!d.nextNumbers){d.nextNumbers={grofwild:d.nextNumber,kleinwild:d.nextNumber,controle:1,registratie:1};delete d.nextNumber}if(!d.taken)d.taken=[];if(!d.orders)d.orders=[];if(!d.haccpLogs)d.haccpLogs=[];if(!d.catalogs)d.catalogs={};if(!d.settings)d.settings={backupUrl:"",backupEmail:""};save(d);alert("Hersteld!")}else alert("Ongeldig.")}catch{alert("Fout.")}};r.readAsText(f)};i.click()};return<div style={{maxWidth:500,margin:"0 auto",padding:16}}><BackBtn nav={nav}/><div style={{fontSize:18,fontWeight:800,color:C.forest,marginBottom:16}}>Instellingen</div><div style={{background:C.w,borderRadius:12,padding:20,border:"1px solid "+C.bd,marginBottom:12}}><div style={{fontSize:14,fontWeight:700,color:C.forest,marginBottom:12}}>☁️ Automatische backup</div><div style={{marginBottom:10}}><label style={{fontSize:11,fontWeight:600,color:C.tl}}>Script URL</label><input value={url} onChange={e=>setUrl(e.target.value)} style={{...inp,marginTop:4}} placeholder="https://script.google.com/macros/s/..."/></div><div style={{marginBottom:14}}><label style={{fontSize:11,fontWeight:600,color:C.tl}}>E-mailadres</label><input value={email} onChange={e=>setEmail(e.target.value)} style={{...inp,marginTop:4}} placeholder="jouw@email.nl"/></div><button onClick={saveSt} style={{width:"100%",padding:10,background:C.forest,color:C.cream,border:"none",borderRadius:8,fontSize:13,fontWeight:700}}>{saved?"✅ Opgeslagen!":"Opslaan"}</button></div><div style={{background:C.w,borderRadius:12,padding:20,border:"1px solid "+C.bd}}><div style={{fontSize:14,fontWeight:700,color:C.forest,marginBottom:12}}>💾 Handmatig</div><div style={{display:"flex",gap:8}}><button onClick={exp} style={{flex:1,padding:10,background:C.cream,border:"1px solid "+C.bd,borderRadius:8,fontSize:13,fontWeight:600,color:C.forest}}>⬇️ Export</button><button onClick={imp} style={{flex:1,padding:10,background:C.cream,border:"1px solid "+C.bd,borderRadius:8,fontSize:13,fontWeight:600,color:C.forest}}>⬆️ Import</button></div></div></div>}

function Layout({children}){

  const {go}=useModuleNav();
  const nav=p=>dispatch({type:'NAV',page:p});
  return <div className="flex h-screen bg-gray-50">
    <aside className="w-52 bg-green-900 text-white flex flex-col shrink-0">
      <button type="button" onClick={()=>go('hub')}
        className="px-5 py-5 border-b border-green-800 text-left hover:bg-green-800 transition-colors">
        <div className="text-xs font-semibold tracking-widest text-green-400 uppercase flex items-center gap-1.5">🏠 De Predetariër</div>
        <div className="text-lg font-bold mt-0.5">Pricing</div>
      </button>
      <nav className="flex-1 py-3 px-2 space-y-0.5">
        {[['products','📦','Producten'],['pricelist','🗒','Prijslijsten'],['analytics','📊','Analytics'],['config','⚙️','Kosten & config']].map(([id,icon,label])=>(
          <button key={id} type="button" onClick={()=>nav(id)}
            className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors ${(state.page===id||(state.page==='product-detail'&&id==='products'))?'bg-green-700 text-white':'text-green-200 hover:bg-green-800 hover:text-white'}`}  >
            <span>{icon}</span>{label}
          </button>
        ))}
      </nav>
      <button type="button" onClick={()=>go('hub')} className="mx-2 mb-2 px-3 py-2.5 rounded-lg text-sm font-medium text-green-200 hover:bg-green-800 hover:text-white text-left flex items-center gap-3">
        <span>↩</span>Naar hoofdmenu
      </button>
      <div className="px-4 py-3 border-t border-green-800 text-xs text-green-600">v0.3.0</div>
    </aside>
    <main className="flex-1 overflow-auto">
      <div className="px-8 py-6 max-w-6xl mx-auto">
        {state.page==='product-detail'&&<button type="button" onClick={()=>nav('products')} className="flex items-center gap-1 text-sm text-gray-400 hover:text-gray-700 mb-4">← Terug naar producten</button>}
        {children}
      </div>
    </main>
  </div>;
}
function Pages(){
  const {state}=useApp();
  if(state.page==='product-detail') return <ProductDetail/>;
  if(state.page==='analytics') return <Analytics/>;
  if(state.page==='config') return <CostConfig/>;
  if(state.page==='pricelist') return <PriceList/>;
  return <Products/>;
}
function App(){
  return <AppProvider><Layout><Pages/></Layout></AppProvider>;
}

// ── MAIN ROOT: schakelt tussen hoofdmenu en de apps ──────────────────────────
function MainRoot(){
  const [module,setModule]=useState('hub'); // 'hub' | 'pricing' | 'preda'
  const [predaView,setPredaView]=useState('dashboard');
  const go=useCallback((m,v)=>{ setModule(m); if(v) setPredaView(v); window.scrollTo(0,0); },[]);
  return <ModuleNav.Provider value={{go,module}}>
    {module==='hub' && <Hub/>}
    {module==='pricing' && <App/>}
    {module==='preda' && <PredaApp initialView={predaView} goHub={()=>go('hub')}/>}
  </ModuleNav.Provider>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<MainRoot/>);
</script>
